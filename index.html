<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emma & Ferdinand — Shared Expenses</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>Shared expenses</h1>
      <div class="subtitle">Emma &amp; Ferdinand</div>
    </div>
    <div class="avatars">
      <div class="avatar av-e">E</div>
      <div class="avatar av-f">F</div>
    </div>
  </div>

  <!-- Balance card -->
  <div class="balance-card">
    <div class="balance-people">
      <div class="avatar av-e" style="width:30px;height:30px;font-size:12px">E</div>
      <div class="balance-arrow">
        <div class="arrow-track">
          <div class="dot dot-e"></div>
          <div class="track-line"></div>
          <div class="dot dot-f"></div>
        </div>
        <div class="arrow-label" id="arrow-label">even</div>
      </div>
      <div class="avatar av-f" style="width:30px;height:30px;font-size:12px">F</div>
    </div>
    <div>
      <div class="balance-amount settled" id="balance-amount">€0.00</div>
      <div class="balance-sublabel" id="balance-label">all settled up</div>
      <button class="settle-btn" id="settle-btn" onclick="settle()" style="display:none">Mark settled</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total spent</div>
      <div class="stat-val" id="total-spent">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Emma paid</div>
      <div class="stat-val" id="emma-paid">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Ferdinand paid</div>
      <div class="stat-val" id="ferd-paid">€0</div>
    </div>
  </div>

  <!-- Expense list -->
  <div class="section-title">Expenses</div>
  <div class="offline-banner" id="offline-banner">
    <div class="offline-dot"></div>
    Backend unreachable — changes saved locally only
  </div>
  <div class="expense-list" id="expense-list">
    <div class="empty" id="empty-state">No expenses yet. Add one below.</div>
  </div>

  <!-- Add expense form -->
  <div class="section-title" style="margin-top:1.5rem">Add expense</div>
  <div class="add-form">
    <div class="form-row">
      <input type="text"   id="desc"   placeholder="Description (e.g. Dinner)" />
      <input type="number" id="amount" placeholder="Amount €" min="0" step="0.01" />
    </div>
    <div class="form-row">
      <select id="paidby">
        <option value="Emma">Paid by Emma</option>
        <option value="Ferdinand">Paid by Ferdinand</option>
      </select>
      <select id="category">
        <option value="🍽️">Food &amp; drink</option>
        <option value="🏠">Housing</option>
        <option value="🚗">Transport</option>
        <option value="🛒">Groceries</option>
        <option value="🎬">Entertainment</option>
        <option value="💊">Health</option>
        <option value="✈️">Travel</option>
        <option value="📦">Other</option>
      </select>
    </div>
    <button class="add-btn" id="add-btn" onclick="addExpense()">Add expense</button>
    <div class="status-msg" id="status-msg"></div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
